services:
  ollama:
    image: ollama/ollama:latest
    container_name: cloudguard-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12

  ollama-init:
    image: ollama/ollama:latest
    container_name: cloudguard-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: "ollama pull ${OLLAMA_MODEL:-llama3.2:3b}"
    environment:
      OLLAMA_HOST: http://ollama:11434
    restart: "no"

  cloudguard-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cloudguard-agent
    depends_on:
      ollama-init:
        condition: service_completed_successfully
    environment:
      APP_ENV: docker
      STORE_BACKEND: sqlite
      SQLITE_PATH: /data/cloudguard.db
      AGENT_MEMORY_SQLITE_PATH: /data/agent_memory.db
      LLM_PROVIDER: ollama
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
      LANGCHAIN_VERBOSE: "false"
      ALERT_MIN_RISK: "45"
    ports:
      - "8000:8080"
    volumes:
      - cloudguard_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=5).read()"]
      interval: 10s
      timeout: 5s
      retries: 12

  simulator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cloudguard-simulator
    depends_on:
      cloudguard-agent:
        condition: service_healthy
    command:
      [
        "python",
        "-m",
        "scenarios.docker_simulator",
        "--agent-url",
        "http://cloudguard-agent:8080",
        "--scenario",
        "mixed",
        "--interval-seconds",
        "120",
      ]
    profiles:
      - sim

volumes:
  ollama_data:
  cloudguard_data:
