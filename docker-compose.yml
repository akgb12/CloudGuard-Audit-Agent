services:
  cloudguard-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cloudguard-agent
    environment:
      APP_ENV: docker
      STORE_BACKEND: sqlite
      SQLITE_PATH: /data/cloudguard.db
      AGENT_MEMORY_SQLITE_PATH: /data/agent_memory.db
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      LANGCHAIN_VERBOSE: "false"
      ALERT_MIN_RISK: "45"
    ports:
      - "8000:8080"
    volumes:
      - cloudguard_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=5).read()"]
      interval: 10s
      timeout: 5s
      retries: 12

  simulator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cloudguard-simulator
    depends_on:
      cloudguard-agent:
        condition: service_healthy
    command:
      [
        "python",
        "-m",
        "scenarios.docker_simulator",
        "--agent-url",
        "http://cloudguard-agent:8080",
        "--scenario",
        "mixed",
        "--interval-seconds",
        "120",
      ]
    profiles:
      - sim

volumes:
  cloudguard_data:
